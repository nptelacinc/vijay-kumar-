<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vijay Kumar Mandal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#062c78;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:390px;
    background:#fff;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.header{
    background:linear-gradient(135deg,#005eff,#002a7a);
    height:220px;
    position:relative;
}

.profile{
    position:absolute;
    left:50%;
    bottom:-70px;
    transform:translateX(-50%);
    text-align:center;
}

.profile img{
    width:150px;
    height:150px;
    border-radius:50%;
    border:7px solid #fff;
    object-fit:cover;
    background:#fff;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.upload-btn{
    margin-top:10px;
    background:#005eff;
    color:#fff;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
    display:inline-block;
    font-size:14px;
}

input[type=file]{
    display:none;
}

.content{
    padding:100px 25px 30px;
    text-align:center;
}

h1{
    color:#0a2d73;
    font-size:36px;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    font-size:19px;
    line-height:1.6;
    margin-bottom:30px;
}

.info-box{
    text-align:left;
    border-left:4px solid #005eff;
    padding-left:15px;
    margin-bottom:25px;
}

.info-box h3{
    color:#005eff;
    margin-bottom:5px;
}

.info-box p{
    color:#444;
    font-size:18px;
}

.edit-btn{
    margin-top:20px;
    background:#0a2d73;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:25px;
    cursor:pointer;
    font-size:16px;
}

.edit-btn:hover{
    background:#005eff;
}

</style>
</head>

<body>

<div class="card">

    <div class="header">

        <div class="profile">

            <img id="profilePic"
            src="https://via.placeholder.com/150"
            alt="Profile">

            <label class="upload-btn">
                Upload Photo
                <input type="file" accept="image/*" onchange="loadImage(event)">
            </label>

        </div>

    </div>

    <div class="content">

        <h1 contenteditable="true">
            Vijay Kumar Mandal
        </h1>

        <div class="subtitle" contenteditable="true">
            Government Engineering College Student<br>
            Electrical Engineering (2023–2027)
        </div>

        <div class="info-box">
            <h3>Profession</h3>
            <p contenteditable="true">
                Engineering Student
            </p>
        </div>

        <div class="info-box">
            <h3>College</h3>
            <p contenteditable="true">
                Government Engineering College
            </p>
        </div>

        <div class="info-box">
            <h3>Branch</h3>
            <p contenteditable="true">
                Electrical Engineering
            </p>
        </div>

        <div class="info-box">
            <h3>Session</h3>
            <p contenteditable="true">
                2023 – 2027
            </p>
        </div>

        <button class="edit-btn">
            Edit Enabled
        </button>

    </div>

</div>

<script>

function loadImage(event){

    const image = document.getElementById('profilePic');

    image.src = URL.createObjectURL(event.target.files[0]);

}

</script>

</body>
</html>
